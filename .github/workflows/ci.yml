name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  GITHUB_USERNAME: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-and-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Log in to GitHub Container Registry (to pull team images)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Add GitHub Packages credentials (workspace copy of nuget.config)
        run: >
          dotnet nuget update source github-lpichet
          --username ${{ github.actor }}
          --password ${{ secrets.GITHUB_TOKEN }}
          --store-password-in-clear-text
          --configfile nuget.config

      - name: Restore (pulls EShop.*.Hosting from GitHub Packages)
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: End-to-end tests (full composition with team images from GHCR)
        run: dotnet test --no-build -c Release --logger "console;verbosity=normal"
